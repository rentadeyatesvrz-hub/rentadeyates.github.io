<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Admin • Elite Yacht Rentals</title>

    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.7/dist/cdn.min.js" defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { background:#0a0a0a; color:#fff; font-family:'Inter', system-ui, sans-serif; }
        .kpi-card { background:linear-gradient(145deg, #1f1f23, #18181b); border:1px solid #27272a; transition:all 0.3s ease; }
        .kpi-card:hover { transform:translateY(-3px); border-color:#fbbf24; }
        .kpi-number { font-family:'Space Grotesk', sans-serif; font-size:2.1rem; font-weight:600; letter-spacing:-0.04em; }
        .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); }
        .live-dot { animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        table { font-size: 0.95rem; }
    </style>
</head>
<body class="min-h-screen flex" x-data="adminApp()">

    <!-- SIDEBAR -->
    <div class="sidebar w-72 min-h-screen p-6 fixed lg:static flex flex-col bg-[#111113] z-50 transition-transform" 
         :class="{ '-translate-x-full lg:translate-x-0': !sidebarOpen }">
        <div class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-3">
                <span class="text-4xl">⛵</span>
                <h1 class="text-3xl font-bold tracking-[-0.04em] text-amber-400">ELITE</h1>
            </div>
            <button @click="sidebarOpen = false" class="lg:hidden text-3xl">✕</button>
        </div>
        <nav class="space-y-2">
            <a href="#" class="flex items-center gap-3 bg-amber-400 text-zinc-950 px-6 py-4 rounded-3xl font-semibold">📊 Dashboard</a>
            <a href="#" class="flex items-center gap-3 hover:bg-white/10 px-6 py-4 rounded-3xl text-slate-300 hover:text-white transition">📅 Reservas</a>
        </nav>
    </div>

    <div class="flex-1 lg:ml-72">
        <!-- Header móvil -->
        <div class="lg:hidden bg-[#111113] p-4 flex items-center justify-between border-b border-white/10">
            <button @click="sidebarOpen = true" class="text-3xl">☰</button>
            <h1 class="text-2xl font-semibold">Panel Admin</h1>
            <button @click="logout()" class="text-red-400">Salir</button>
        </div>

        <div class="p-6 md:p-8">
            <!-- LOGIN -->
            <div :class="{ 'hidden': isLoggedIn }" class="max-w-md mx-auto glass border border-white/10 rounded-3xl p-10">
                <h2 class="text-3xl font-semibold text-center mb-8">Acceso Admin</h2>
                <input id="email" type="email" placeholder="Correo administrador" class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-5 py-4 mb-4">
                <input id="password" type="password" placeholder="Contraseña" class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-5 py-4 mb-6">
                <button @click="login()" class="w-full bg-amber-400 text-zinc-950 py-4 rounded-2xl font-semibold text-lg">Entrar al Panel</button>
            </div>

            <!-- DASHBOARD -->
            <div :class="{ 'hidden': !isLoggedIn }">
                <h1 class="text-3xl font-semibold tracking-tight mb-8 hidden lg:block">Panel de Administración</h1>

                <!-- KPIs -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
                    <div class="kpi-card rounded-3xl p-6">
                        <p class="text-emerald-400 text-xs tracking-widest">RESERVAS HOY</p>
                        <p class="kpi-number text-white mt-2" x-text="kpiReservasHoy"></p>
                    </div>
                    <div class="kpi-card rounded-3xl p-6">
                        <p class="text-amber-400 text-xs tracking-widest">INGRESOS HOY</p>
                        <p class="kpi-number text-amber-400 mt-2" x-text="kpiIngresosHoy"></p>
                    </div>
                    <div class="kpi-card rounded-3xl p-6">
                        <p class="text-white text-xs tracking-widest">YATE MÁS RESERVADO</p>
                        <p class="kpi-number text-white mt-2" x-text="kpiYatePopular"></p>
                    </div>
                    <div class="kpi-card rounded-3xl p-6">
                        <p class="text-sky-400 text-xs tracking-widest">OCUPACIÓN</p>
                        <p class="kpi-number text-emerald-400 mt-2" x-text="kpiOcupacion"></p>
                    </div>
                </div>

                <!-- Gráficos -->
                <div class="glass border border-white/10 rounded-3xl p-6 md:p-8 mb-8">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-xs font-medium text-slate-400 mb-4">Reservas por día</h3>
                            <canvas id="barChart" class="w-full h-64"></canvas>
                        </div>
                        <div>
                            <h3 class="text-xs font-medium text-slate-400 mb-4">Distribución por yate</h3>
                            <canvas id="pieChart" class="w-full h-64"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Tabla -->
                <div class="glass border border-white/10 rounded-3xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-zinc-900">
                            <tr>
                                <th class="px-6 py-5 text-left">YATE</th>
                                <th class="px-6 py-5 text-left">FECHA</th>
                                <th class="px-6 py-5 text-left">HORA</th>
                                <th class="px-6 py-5 text-left">CLIENTE</th>
                                <th class="px-6 py-5 text-left">CUMPLEAÑOS</th>
                                <th class="px-6 py-5 text-center">ACCIÓN</th>
                            </tr>
                        </thead>
                        <tbody id="reservas-table" class="divide-y divide-white/10"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adminApp() {
            return {
                isLoggedIn: false,
                sidebarOpen: false,
                allReservas: [],
                barChartInstance: null,
                pieChartInstance: null,

                kpiReservasHoy: 0,
                kpiIngresosHoy: '$0',
                kpiYatePopular: '—',
                kpiOcupacion: '0%',

                init() {
                    const firebaseConfig = {
                        apiKey: "AIzaSyCDtCAOAalVb0ReJjSaIzjEQimoQ-9_4e0",
                        authDomain: "elite-yacht-rentals.firebaseapp.com",
                        projectId: "elite-yacht-rentals",
                        storageBucket: "elite-yacht-rentals.firebasestorage.app",
                        messagingSenderId: "601846230412",
                        appId: "1:601846230412:web:e9b96b3aedfa013617faa9"
                    };
                    firebase.initializeApp(firebaseConfig);
                    const auth = firebase.auth();
                    const db = firebase.firestore();

                    auth.onAuthStateChanged(user => {
                        if (user) {
                            this.isLoggedIn = true;
                            this.cargarReservasAdmin(db);
                        }
                    });
                },

                login() {
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    firebase.auth().signInWithEmailAndPassword(email, password)
                        .then(() => this.isLoggedIn = true)
                        .catch(err => alert("Error: " + err.message));
                },

                logout() {
                    firebase.auth().signOut().then(() => location.reload());
                },

                cargarReservasAdmin(db) {
                    db.collection("reservas").onSnapshot(snapshot => {
                        this.allReservas = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                        this.calcularKPIs();
                        this.renderTable();
                        this.renderCharts();
                    });
                },

                calcularKPIs() {
                    const hoy = this.todayText();
                    const hoyData = this.allReservas.filter(r => r.fecha === hoy);
                    this.kpiReservasHoy = hoyData.length;

                    let ingresos = 0;
                    const PRECIOS = { "La Gozadera":9000, "La Pachanga":10500, "Monky":8000, "Percales":15000 };
                    hoyData.forEach(r => ingresos += PRECIOS[r.yate] || 8500);
                    this.kpiIngresosHoy = '$' + ingresos.toLocaleString('es-MX');

                    const conteo = {};
                    this.allReservas.forEach(r => conteo[r.yate] = (conteo[r.yate]||0) + 1);
                    let max = 0, popular = "—";
                    Object.keys(conteo).forEach(k => { if(conteo[k] > max){ max = conteo[k]; popular = k; }});
                    this.kpiYatePopular = popular;
                    this.kpiOcupacion = Math.min(Math.round((this.allReservas.length / 16) * 100), 100) + '%';
                },

                renderTable() {
                    const tbody = document.getElementById('reservas-table');
                    tbody.innerHTML = this.allReservas.map(r => `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="px-6 py-5">${r.yate || '-'}</td>
                            <td class="px-6 py-5">${r.fecha || '-'}</td>
                            <td class="px-6 py-5">${r.hora || '-'}</td>
                            <td class="px-6 py-5">${r.nombreCliente || r.nombre || '-'}</td>
                            <td class="px-6 py-5">${r.fechaCumpleanos || '-'}</td>
                            <td class="px-6 py-5 text-center">
                                <button onclick="agregarAGoogleCalendar('${r.yate||''}','${r.fecha||''}','${r.hora||''}')" class="text-emerald-400 mr-4">📅</button>
                                <button onclick="borrarReserva('${r.id}')" class="text-red-400 text-xl">🗑️</button>
                            </td>
                        </tr>
                    `).join('');
                },

                renderCharts() {
                    if (this.barChartInstance) this.barChartInstance.destroy();
                    if (this.pieChartInstance) this.pieChartInstance.destroy();

                    const grouped = {};
                    this.allReservas.forEach(r => grouped[r.fecha] = (grouped[r.fecha]||0) + 1);
                    const labels = Object.keys(grouped).sort();
                    const values = labels.map(d => grouped[d]);

                    this.barChartInstance = new Chart(document.getElementById('barChart'), {
                        type: 'bar',
                        data: { labels, datasets:[{ label:'Reservas', data:values, backgroundColor:'#fbbf24', borderColor:'#f59e0b', borderWidth:1, borderRadius:6 }] },
                        options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(255,255,255,0.08)'}, ticks:{color:'#888'}}, x:{grid:{color:'rgba(255,255,255,0.08)'}, ticks:{color:'#888'}} }}
                    });

                    const conteoYates = {};
                    this.allReservas.forEach(r => conteoYates[r.yate] = (conteoYates[r.yate]||0) + 1);

                    this.pieChartInstance = new Chart(document.getElementById('pieChart'), {
                        type: 'pie',
                        data: { labels: Object.keys(conteoYates), datasets:[{ data: Object.values(conteoYates), backgroundColor: ['#fbbf24','#f59e0b','#d97706','#b45309'], borderColor:'#111113', borderWidth:3 }] },
                        options: { responsive:true, plugins:{legend:{position:'bottom', labels:{color:'#ddd', boxWidth:12, padding:18}}}}
                    });
                },

                borrarReserva(id) {
                    if (confirm("¿Eliminar esta reserva?")) {
                        firebase.firestore().collection('reservas').doc(id).delete();
                    }
                },

                borrarTodasLasReservas() {
                    if (confirm("¿Borrar TODAS las reservas?") && confirm("Acción irreversible. ¿Confirmas?")) {
                        const batch = firebase.firestore().batch();
                        firebase.firestore().collection("reservas").get().then(snapshot => {
                            snapshot.docs.forEach(doc => batch.delete(doc.ref));
                            batch.commit();
                        });
                    }
                },

                todayText() {
                    const d = new Date();
                    const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
                    return `${String(d.getDate()).padStart(2,'0')} ${meses[d.getMonth()]} ${d.getFullYear()}`;
                },

                agregarAGoogleCalendar(yate, fecha, hora) {
                    if (!fecha) return;
                    const fechaISO = fecha.split(' ').reverse().join('-');
                    const start = `${fechaISO}T${hora}:00`;
                    const end = `${fechaISO}T${hora.split(':')[0]}:${parseInt(hora.split(':')[1])+2}:00`;
                    const link = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Reserva Elite - ' + yate)}&dates=${start.replace(/[:-]/g,'')}/${end.replace(/[:-]/g,'')}`;
                    window.open(link, '_blank');
                },

                exportarCSV() {
                    let csv = "Yate,Fecha,Hora,Cliente,Cumpleaños,Telefono\n";
                    this.allReservas.forEach(r => {
                        csv += `"${r.yate||''}","${r.fecha||''}","${r.hora||''}","${r.nombreCliente||''}","${r.fechaCumpleanos||''}","${r.telefono||''}"\n`;
                    });
                    const blob = new Blob([csv], {type: 'text/csv'});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `reservas_${new Date().toISOString().slice(0,10)}.csv`;
                    link.click();
                }
            }
        }
    </script>
</body>
</html>
