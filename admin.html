<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Elite Yacht Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { background:#0a0a0a; color:#fff; font-family:'Inter', system-ui, sans-serif; }
        .sidebar { background:#111113; }
        .kpi-card { background:#1a1a1e; border:1px solid #27272a; transition:all 0.3s ease; }
        .kpi-card:hover { transform:translateY(-4px); border-color:#fbbf24; }
        .kpi-number { font-family:'Space Grotesk', sans-serif; font-size:2.8rem; font-weight:600; letter-spacing:-0.03em; }
        .glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(16px); }
        .live-dot { animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- SIDEBAR -->
    <div class="sidebar w-72 min-h-screen p-6 fixed lg:static flex flex-col">
        <div class="flex items-center gap-3 mb-10">
            <span class="text-4xl">⛵</span>
            <h1 class="text-3xl font-bold tracking-[-0.04em] text-amber-400">ELITE</h1>
        </div>
        <nav class="space-y-1">
            <a href="#" class="flex items-center gap-3 bg-amber-400 text-zinc-950 px-6 py-4 rounded-3xl font-semibold">
                📊 Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 hover:bg-white/10 px-6 py-4 rounded-3xl text-slate-300 hover:text-white transition">
                📅 Reservas
            </a>
        </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-1 lg:ml-72 p-8">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-semibold">Panel de Administración</h1>
                <p id="last-updated" class="text-emerald-400 text-sm flex items-center gap-2 mt-2">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></span>
                    Conectado a Firebase • En vivo
                </p>
            </div>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-2xl text-sm font-medium">Cerrar Sesión</button>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-emerald-400 text-sm font-medium">RESERVAS HOY</p>
                <p id="kpi-reservas-hoy" class="kpi-number text-white mt-3">0</p>
            </div>
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-amber-400 text-sm font-medium">INGRESOS HOY</p>
                <p id="kpi-ingresos" class="kpi-number text-amber-400 mt-3">$0</p>
            </div>
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-white text-sm font-medium">YATE MÁS RESERVADO</p>
                <p id="kpi-yate-popular" class="kpi-number text-white mt-3">—</p>
            </div>
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-sky-400 text-sm font-medium">OCUPACIÓN</p>
                <p id="kpi-ocupacion" class="kpi-number text-emerald-400 mt-3">0%</p>
            </div>
        </div>

        <!-- Filtros + Gráficos -->
        <div class="glass border border-white/10 rounded-3xl p-8 mb-8">
            <div class="flex flex-wrap gap-4 items-end mb-8">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Desde</label>
                    <input id="filter-desde" class="flatpickr-input bg-zinc-900 border border-white/20 rounded-2xl px-5 py-4 w-44" placeholder="dd/mm/aaaa">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Hasta</label>
                    <input id="filter-hasta" class="flatpickr-input bg-zinc-900 border border-white/20 rounded-2xl px-5 py-4 w-44" placeholder="dd/mm/aaaa">
                </div>
                <button onclick="applyFilters()" class="bg-amber-400 text-zinc-950 px-8 py-4 rounded-2xl font-semibold">Filtrar</button>
                <button onclick="resetFilters()" class="border border-white/30 hover:bg-white/10 px-8 py-4 rounded-2xl">Resetear</button>
                
                <div class="ml-auto flex gap-3">
                    <button onclick="borrarTodasLasReservas()" class="bg-red-600/90 hover:bg-red-700 px-6 py-4 rounded-2xl text-sm font-medium flex items-center gap-2">
                        🗑️ Borrar todas
                    </button>
                    <button onclick="exportarCSV()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-4 rounded-2xl font-semibold flex items-center gap-2">
                        📤 Exportar CSV
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Gráfico de barras -->
                <div>
                    <h3 class="text-sm font-medium text-slate-400 mb-4">Reservas por día</h3>
                    <canvas id="barChart" class="w-full h-72"></canvas>
                </div>
                <!-- Gráfico de pastel -->
                <div>
                    <h3 class="text-sm font-medium text-slate-400 mb-4">Distribución por yate</h3>
                    <canvas id="pieChart" class="w-full h-72"></canvas>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="glass border border-white/10 rounded-3xl overflow-hidden">
            <table class="w-full">
                <thead class="bg-zinc-900">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-medium text-slate-400">YATE</th>
                        <th class="px-8 py-5 text-left text-xs font-medium text-slate-400">FECHA</th>
                        <th class="px-8 py-5 text-left text-xs font-medium text-slate-400">HORA</th>
                        <th class="px-8 py-5 text-left text-xs font-medium text-slate-400">CLIENTE</th>
                        <th class="px-8 py-5 text-left text-xs font-medium text-slate-400">CUMPLEAÑOS</th>
                        <th class="px-8 py-5 text-center text-xs font-medium text-slate-400">ACCIÓN</th>
                    </tr>
                </thead>
                <tbody id="reservas-table" class="divide-y divide-white/10 text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCDtCAOAalVb0ReJjSaIzjEQimoQ-9_4e0",
            authDomain: "elite-yacht-rentals.firebaseapp.com",
            projectId: "elite-yacht-rentals",
            storageBucket: "elite-yacht-rentals.firebasestorage.app",
            messagingSenderId: "601846230412",
            appId: "1:601846230412:web:e9b96b3aedfa013617faa9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allReservas = [];
        let barChartInstance = null;
        let pieChartInstance = null;
        let desdePicker, hastaPicker;

        const PRECIOS = { "La Gozadera":9000, "La Pachanga":10500, "Monky":8000, "Percales":15000 };

        function todayText() {
            const d = new Date();
            const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
            return `${String(d.getDate()).padStart(2,'0')} ${meses[d.getMonth()]} ${d.getFullYear()}`;
        }

        function calcularKPIs(data) {
            const hoy = todayText();
            const hoyData = data.filter(r => r.fecha === hoy);
            
            document.getElementById('kpi-reservas-hoy').textContent = hoyData.length;
            
            let ingresos = 0;
            hoyData.forEach(r => ingresos += PRECIOS[r.yate] || 8500);
            document.getElementById('kpi-ingresos').textContent = '$' + ingresos.toLocaleString('es-MX');
            
            const conteo = {};
            data.forEach(r => conteo[r.yate] = (conteo[r.yate]||0) + 1);
            let max = 0, popular = "—";
            Object.keys(conteo).forEach(k => {
                if (conteo[k] > max) { max = conteo[k]; popular = k; }
            });
            document.getElementById('kpi-yate-popular').textContent = popular;
        }

        function renderTable(data) {
            const tbody = document.getElementById('reservas-table');
            tbody.innerHTML = data.map(r => `
                <tr class="hover:bg-white/5">
                    <td class="px-8 py-5">${r.yate || '-'}</td>
                    <td class="px-8 py-5">${r.fecha || '-'}</td>
                    <td class="px-8 py-5">${r.hora || '-'}</td>
                    <td class="px-8 py-5">${r.nombreCliente || r.nombre || '-'}</td>
                    <td class="px-8 py-5">${r.fechaCumpleanos || '-'}</td>
                    <td class="px-8 py-5 text-center">
                        <button onclick="agregarAGoogleCalendar('${r.yate||''}','${r.fecha||''}','${r.hora||''}')" 
                                class="text-emerald-400 hover:text-emerald-300 text-sm font-medium">📅 Calendar</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderCharts(data) {
            // Bar Chart
            if (barChartInstance) barChartInstance.destroy();
            const grouped = {};
            data.forEach(r => grouped[r.fecha] = (grouped[r.fecha]||0) + 1);
            const labels = Object.keys(grouped).sort();
            const values = labels.map(d => grouped[d]);

            barChartInstance = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { labels, datasets:[{ label:'Reservas', data:values, backgroundColor:'#fbbf24', borderColor:'#f59e0b', borderWidth:1, borderRadius:4 }] },
                options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(255,255,255,0.1)'}, ticks:{color:'#888'}}, x:{grid:{color:'rgba(255,255,255,0.1)'}, ticks:{color:'#888'}} }}
            });

            // Pie Chart
            if (pieChartInstance) pieChartInstance.destroy();
            const conteoYates = {};
            data.forEach(r => conteoYates[r.yate] = (conteoYates[r.yate]||0) + 1);

            pieChartInstance = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: Object.keys(conteoYates),
                    datasets: [{ data: Object.values(conteoYates), backgroundColor: ['#fbbf24','#f59e0b','#d97706','#b45309'], borderColor:'#111113', borderWidth:3 }]
                },
                options: { responsive:true, plugins:{legend:{position:'bottom', labels:{color:'#ccc', boxWidth:12, padding:20}}}}
            });
        }

        function applyFilters() {
            const desde = desdePicker.selectedDates[0];
            const hasta = hastaPicker.selectedDates[0];
            let filtered = allReservas;
            if (desde) filtered = filtered.filter(r => new Date(r.fecha.split(' ').reverse().join('-')) >= desde);
            if (hasta) filtered = filtered.filter(r => new Date(r.fecha.split(' ').reverse().join('-')) <= hasta);
            
            calcularKPIs(filtered);
            renderTable(filtered);
            renderCharts(filtered);
        }

        function resetFilters() {
            desdePicker.clear();
            hastaPicker.clear();
            applyFilters();
        }

        function exportarCSV() {
            let csv = "Yate,Fecha,Hora,Cliente,Cumpleaños,Telefono\n";
            allReservas.forEach(r => {
                csv += `"${r.yate||''}","${r.fecha||''}","${r.hora||''}","${r.nombreCliente||''}","${r.fechaCumpleanos||''}","${r.telefono||''}"\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `reservas_elite_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        async function borrarTodasLasReservas() {
            if (!confirm("⚠️ ¿Estás seguro de borrar TODAS las reservas?\nEsta acción es irreversible.")) return;
            if (!confirm("¿Confirmas por segunda vez? Se eliminarán todas las reservas de la base de datos.")) return;
            
            const batch = db.batch();
            const snapshot = await db.collection("reservas").get();
            snapshot.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Todas las reservas han sido eliminadas.");
        }

        function cargarReservasAdmin() {
            db.collection("reservas").onSnapshot(snapshot => {
                allReservas = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                calcularKPIs(allReservas);
                renderTable(allReservas);
                renderCharts(allReservas);
            });
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        function agregarAGoogleCalendar(yate, fecha, hora) { /* tu función anterior */ }

        auth.onAuthStateChanged(user => { if (user) cargarReservasAdmin(); });

        window.onload = () => {
            desdePicker = flatpickr("#filter-desde", {locale:"es", dateFormat:"d/m/Y"});
            hastaPicker = flatpickr("#filter-hasta", {locale:"es", dateFormat:"d/m/Y"});
        };
    </script>
</body>
</html>
