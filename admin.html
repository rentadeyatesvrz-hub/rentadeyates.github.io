<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Elite Yacht Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .sidebar { background: #18181b; }
        .kpi-card { background: #27272a; }
        table { border-collapse: collapse; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #3f3f46; }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- SIDEBAR -->
    <div class="sidebar w-72 min-h-screen p-6 fixed lg:static">
        <div class="flex items-center gap-3 mb-12">
            <span class="text-4xl">⛵</span>
            <h1 class="text-2xl font-bold tracking-widest text-amber-400">ELITE</h1>
        </div>
        
        <nav class="space-y-2">
            <a href="#" class="flex items-center gap-3 bg-amber-400 text-zinc-950 px-5 py-4 rounded-2xl font-medium">
                <span>📊</span> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 hover:bg-zinc-800 px-5 py-4 rounded-2xl transition">
                <span>📅</span> Reservas
            </a>
            <a href="#" class="flex items-center gap-3 hover:bg-zinc-800 px-5 py-4 rounded-2xl transition">
                <span>⛵</span> Flota
            </a>
            <a href="#" class="flex items-center gap-3 hover:bg-zinc-800 px-5 py-4 rounded-2xl transition">
                <span>👤</span> Clientes
            </a>
            <a href="#" class="flex items-center gap-3 hover:bg-zinc-800 px-5 py-4 rounded-2xl transition">
                <span>📈</span> Reportes
            </a>
            <a href="#" class="flex items-center gap-3 hover:bg-zinc-800 px-5 py-4 rounded-2xl transition">
                <span>⚙️</span> Configuración
            </a>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 lg:ml-72 p-6 lg:p-10">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold text-amber-400">Panel de Administración</h1>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-2xl text-sm font-medium">
                Cerrar Sesión
            </button>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-zinc-400 text-sm">Reservas Hoy</p>
                <p id="kpi-reservas-hoy" class="text-5xl font-bold text-white mt-2">24</p>
            </div>
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-zinc-400 text-sm">Ingresos Estimados</p>
                <p id="kpi-ingresos" class="text-5xl font-bold text-amber-400 mt-2">$12,450</p>
            </div>
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-zinc-400 text-sm">Yate Más Reservado</p>
                <p id="kpi-yate-popular" class="text-3xl font-bold text-white mt-2">Luxury 80</p>
            </div>
            <div class="kpi-card rounded-3xl p-6">
                <p class="text-zinc-400 text-sm">Ocupación</p>
                <p id="kpi-ocupacion" class="text-5xl font-bold text-emerald-400 mt-2">78%</p>
            </div>
        </div>

        <!-- Login Screen -->
        <div id="login-screen" class="max-w-md mx-auto bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Acceso Administrador</h2>
            <input id="email" type="email" placeholder="Correo administrador" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4">
            <input id="password" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
            <button onclick="login()" class="w-full bg-amber-400 hover:bg-amber-300 text-zinc-950 font-bold py-4 rounded-2xl">Ingresar</button>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboard" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold">Reservas en Tiempo Real</h2>
            </div>

            <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-zinc-800">
                            <tr>
                                <th class="font-medium">Yate</th>
                                <th class="font-medium">Fecha</th>
                                <th class="font-medium">Hora</th>
                                <th class="font-medium">Nombre</th>
                                <th class="font-medium">Apellido</th>
                                <th class="font-medium text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="reservas-table" class="divide-y divide-zinc-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === TU CONFIGURACIÓN FIREBASE ORIGINAL (sin cambios) ===
        const firebaseConfig = {
            apiKey: "AIzaSyCDtCAOAalVb0ReJjSaIzjEQimoQ-9_4e0",
            authDomain: "elite-yacht-rentals.firebaseapp.com",
            projectId: "elite-yacht-rentals",
            storageBucket: "elite-yacht-rentals.firebasestorage.app",
            messagingSenderId: "601846230412",
            appId: "1:601846230412:web:e9b96b3aedfa013617faa9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    cargarReservasAdmin();
                })
                .catch((error) => alert("Error: " + error.message));
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        function cargarReservasAdmin() {
            const table = document.getElementById('reservas-table');
            db.collection("reservas").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                table.innerHTML = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="font-medium py-5">${r.yate}</td>
                        <td class="py-5">${r.fecha}</td>
                        <td class="py-5">${r.hora}</td>
                        <td class="py-5">${r.nombre || '-'}</td>
                        <td class="py-5">${r.apellido || '-'}</td>
                        <td class="py-5 text-center">
                            <button onclick="agregarAGoogleCalendar('${r.yate}', '${r.fecha}', '${r.hora}', '${r.nombre || ''}', '${r.apellido || ''}')" 
                                    class="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-2xl text-sm">
                                📅 Google Calendar
                            </button>
                        </td>
                    `;
                    table.appendChild(row);
                });
            });
        }

        function agregarAGoogleCalendar(yate, fecha, hora, nombre, apellido) {
            const fechaISO = fecha.split(' ').reverse().join('-');
            const startTime = `${fechaISO}T${hora}:00`;
            const endTime = `${fechaISO}T${hora.split(':')[0]}:${parseInt(hora.split(':')[1]) + 2}:00`;

            const titulo = `Reserva Elite - ${yate}`;
            const detalles = `Cliente: ${nombre} ${apellido}\nYate: ${yate}\nHora: ${hora}`;

            const link = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titulo)}&dates=${startTime.replace(/[:-]/g, '')}/${endTime.replace(/[:-]/g, '')}&details=${encodeURIComponent(detalles)}&sf=true`;
            window.open(link, '_blank');
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                cargarReservasAdmin();
            }
        });
    </script>
</body>
</html>
