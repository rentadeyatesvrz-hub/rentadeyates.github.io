<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Elite Yacht Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .admin-card { background: #18181b; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #27272a; }
        
        /* Mejora responsive para tabla en móviles */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold text-amber-400">Panel de Administración</h1>
                <p class="text-zinc-400 text-sm sm:text-base">Elite Yacht Rentals</p>
            </div>
            <button onclick="logout()" 
                    class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-xl text-sm font-medium w-full sm:w-auto">
                Cerrar Sesión
            </button>
        </div>

        <!-- Login Screen -->
        <div id="login-screen" class="max-w-md mx-auto bg-zinc-900 rounded-3xl p-6 sm:p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Acceso Administrador</h2>
            <input id="email" type="email" placeholder="Correo administrador" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 text-white text-base">
            <input id="password" type="password" placeholder="Contraseña" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 text-white text-base">
            <button onclick="login()" 
                    class="w-full bg-amber-400 hover:bg-amber-300 text-zinc-950 font-bold py-4 rounded-2xl text-base">
                Ingresar
            </button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <h2 class="text-2xl sm:text-3xl font-bold mb-6">Reservas en Tiempo Real</h2>
            
            <div class="admin-card rounded-3xl overflow-hidden">
                <div class="table-container">
                    <table class="min-w-full text-sm">
                        <thead class="bg-zinc-800 sticky top-0">
                            <tr>
                                <th class="font-medium whitespace-nowrap">Yate</th>
                                <th class="font-medium whitespace-nowrap">Fecha</th>
                                <th class="font-medium whitespace-nowrap">Hora</th>
                                <th class="font-medium whitespace-nowrap">Nombre</th>
                                <th class="font-medium whitespace-nowrap">Apellido</th>
                                <th class="font-medium text-center whitespace-nowrap">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="reservas-table" class="divide-y divide-zinc-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === TU CONFIGURACIÓN FIREBASE (sin cambios) ===
        const firebaseConfig = {
            apiKey: "AIzaSyCDtCAOAalVb0ReJjSaIzjEQimoQ-9_4e0",
            authDomain: "elite-yacht-rentals.firebaseapp.com",
            projectId: "elite-yacht-rentals",
            storageBucket: "elite-yacht-rentals.firebasestorage.app",
            messagingSenderId: "601846230412",
            appId: "1:601846230412:web:e9b96b3aedfa013617faa9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    cargarReservasAdmin();
                })
                .catch((error) => alert("Error: " + error.message));
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        function cargarReservasAdmin() {
            const table = document.getElementById('reservas-table');
            db.collection("reservas").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                table.innerHTML = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    const row = document.createElement('tr');
                    row.className = "hover:bg-zinc-800 transition";
                    row.innerHTML = `
                        <td class="font-medium py-4">${r.yate}</td>
                        <td class="py-4">${r.fecha}</td>
                        <td class="py-4">${r.hora}</td>
                        <td class="py-4">${r.nombre || '-'}</td>
                        <td class="py-4">${r.apellido || '-'}</td>
                        <td class="py-4 text-center">
                            <button onclick="agregarAGoogleCalendar('${r.yate}', '${r.fecha}', '${r.hora}', '${r.nombre || ''}', '${r.apellido || ''}')" 
                                    class="bg-green-600 hover:bg-green-500 text-white text-xs px-5 py-2.5 rounded-xl transition">
                                📅 Google Calendar
                            </button>
                        </td>
                    `;
                    table.appendChild(row);
                });
            });
        }

        function agregarAGoogleCalendar(yate, fecha, hora, nombre, apellido) {
            const fechaISO = fecha.split(' ').reverse().join('-');
            const startTime = `${fechaISO}T${hora}:00`;
            const endTime = `${fechaISO}T${hora.split(':')[0]}:${parseInt(hora.split(':')[1]) + 2}:00`;

            const titulo = `Reserva Elite - ${yate}`;
            const detalles = `Cliente: ${nombre} ${apellido}\nYate: ${yate}\nHora: ${hora}`;

            const link = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titulo)}&dates=${startTime.replace(/[:-]/g, '')}/${endTime.replace(/[:-]/g, '')}&details=${encodeURIComponent(detalles)}&sf=true`;

            window.open(link, '_blank');
        }

        // Auto-login si ya está autenticado
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                cargarReservasAdmin();
            }
        });
    </script>
</body>
</html>
