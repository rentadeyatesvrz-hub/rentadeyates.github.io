<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Elite Yacht Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        body { background:#0a0a0a; color:#fff; font-family:'Inter',system-ui,sans-serif; }
        .sidebar { background:linear-gradient(180deg,#18181b,#111113); }
        .kpi-card { background:linear-gradient(145deg,#27272a,#1f1f23); border:1px solid rgba(251,191,36,0.18); }
        .kpi-card:hover { transform:translateY(-6px) scale(1.02); }
        .kpi-number { font-family:'Space Grotesk',sans-serif; font-size:3.2rem; font-weight:600; letter-spacing:-0.04em; }
        .glass { background:rgba(255,255,255,0.06); backdrop-filter:blur(20px); }
        .live-dot { animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- SIDEBAR -->
    <div class="sidebar w-72 min-h-screen p-6 fixed lg:static flex flex-col">
        <div class="flex items-center gap-3 mb-12">
            <span class="text-5xl">⛵</span>
            <h1 class="text-3xl font-bold tracking-[-0.04em] text-amber-400">ELITE</h1>
        </div>
        <nav class="space-y-2 flex-1">
            <a href="#" class="flex items-center gap-3 bg-amber-400 text-zinc-950 px-6 py-5 rounded-3xl font-semibold text-lg">📊 Dashboard</a>
            <a href="#" class="flex items-center gap-3 hover:bg-white/10 px-6 py-5 rounded-3xl text-slate-300 hover:text-white text-lg">📅 Reservas</a>
        </nav>
    </div>

    <div class="flex-1 lg:ml-72 p-6 lg:p-10">
        <div class="rounded-3xl px-8 py-6 mb-10 flex justify-between bg-gradient-to-r from-zinc-900 to-zinc-800 border border-white/10">
            <div>
                <h1 class="text-4xl font-semibold">Panel de Administración</h1>
                <p id="last-updated" class="text-emerald-400 text-sm flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></span>
                    Conectado a Firebase
                </p>
            </div>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-2xl text-sm font-medium">Cerrar Sesión</button>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-12" id="kpi-container">
            <div class="kpi-card rounded-3xl p-8"><p class="uppercase text-emerald-400 text-sm">Reservas Hoy</p><p id="kpi-reservas-hoy" class="kpi-number text-white mt-4">0</p></div>
            <div class="kpi-card rounded-3xl p-8"><p class="uppercase text-amber-400 text-sm">Ingresos Hoy</p><p id="kpi-ingresos" class="kpi-number text-amber-400 mt-4">$0</p></div>
            <div class="kpi-card rounded-3xl p-8"><p class="uppercase text-white text-sm">Yate Más Reservado</p><p id="kpi-yate-popular" class="kpi-number text-white mt-4">—</p></div>
            <div class="kpi-card rounded-3xl p-8"><p class="uppercase text-sky-400 text-sm">Ocupación</p><p id="kpi-ocupacion" class="kpi-number text-emerald-400 mt-4">0%</p></div>
        </div>

        <!-- Filtros + Gráfico -->
        <div class="glass border border-white/10 rounded-3xl p-8 mb-8">
            <div class="flex flex-wrap gap-4 mb-6">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Desde</label>
                    <input id="filter-desde" class="flatpickr-input bg-zinc-900 border border-white/20 rounded-2xl px-5 py-4 w-40" placeholder="dd/mm/aaaa">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Hasta</label>
                    <input id="filter-hasta" class="flatpickr-input bg-zinc-900 border border-white/20 rounded-2xl px-5 py-4 w-40" placeholder="dd/mm/aaaa">
                </div>
                <button onclick="applyFilters()" class="bg-amber-400 text-zinc-950 px-8 py-4 rounded-2xl font-semibold">Filtrar</button>
                <button onclick="resetFilters()" class="border border-white/30 hover:bg-white/10 px-8 py-4 rounded-2xl">Resetear</button>
                <button onclick="exportarCSV()" class="ml-auto flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-4 rounded-2xl font-semibold">📤 Exportar CSV</button>
            </div>
            <canvas id="reservasChart" class="w-full h-80"></canvas>
        </div>

        <!-- Tabla -->
        <div class="glass border border-white/10 rounded-3xl overflow-hidden">
            <table class="w-full">
                <thead class="bg-zinc-800/70">
                    <tr>
                        <th class="px-8 py-6 text-left uppercase text-xs">Yate</th>
                        <th class="px-8 py-6 text-left uppercase text-xs">Fecha</th>
                        <th class="px-8 py-6 text-left uppercase text-xs">Hora</th>
                        <th class="px-8 py-6 text-left uppercase text-xs">Cliente</th>
                        <th class="px-8 py-6 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="reservas-table" class="divide-y divide-white/10"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDtCAOAalVb0ReJjSaIzjEQimoQ-9_4e0",
            authDomain: "elite-yacht-rentals.firebaseapp.com",
            projectId: "elite-yacht-rentals",
            storageBucket: "elite-yacht-rentals.firebasestorage.app",
            messagingSenderId: "601846230412",
            appId: "1:601846230412:web:e9b96b3aedfa013617faa9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allReservas = [];
        let chartInstance = null;
        let desdePicker, hastaPicker;

        const PRECIOS = { "La Gozadera":9000, "La Pachanga":10500, "Monky":8000, "Percales":15000 };

        function todayText() {
            const d = new Date();
            const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
            return `${String(d.getDate()).padStart(2,'0')} ${meses[d.getMonth()]} ${d.getFullYear()}`;
        }

        function calcularKPIs(data) {
            const hoy = todayText();
            const hoyData = data.filter(r => r.fecha === hoy);
            
            document.getElementById('kpi-reservas-hoy').textContent = hoyData.length;
            
            let ingresos = 0;
            hoyData.forEach(r => ingresos += PRECIOS[r.yate] || 8500);
            document.getElementById('kpi-ingresos').textContent = '$' + ingresos.toLocaleString('es-MX');
            
            // Yate más reservado
            const conteo = {};
            data.forEach(r => conteo[r.yate] = (conteo[r.yate]||0)+1);
            let max = 0, popular = "—";
            Object.keys(conteo).forEach(k => { if(conteo[k]>max){ max=conteo[k]; popular=k; }});
            document.getElementById('kpi-yate-popular').textContent = popular;
        }

        function renderTable(data) {
            const tbody = document.getElementById('reservas-table');
            tbody.innerHTML = data.map(r => `
                <tr class="hover:bg-zinc-800/70">
                    <td class="px-8 py-6">${r.yate||'-'}</td>
                    <td class="px-8 py-6">${r.fecha||'-'}</td>
                    <td class="px-8 py-6">${r.hora||'-'}</td>
                    <td class="px-8 py-6">${r.nombreCliente || r.nombre || '-'}</td>
                    <td class="px-8 py-6 text-center">
                        <button onclick="agregarAGoogleCalendar('${r.yate||''}','${r.fecha||''}','${r.hora||''}')" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl text-sm">📅 Calendar</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderChart(data) {
            if (chartInstance) chartInstance.destroy();
            const grouped = {};
            data.forEach(r => grouped[r.fecha] = (grouped[r.fecha]||0)+1);
            const labels = Object.keys(grouped).sort();
            const values = labels.map(d => grouped[d]);

            chartInstance = new Chart(document.getElementById('reservasChart'), {
                type: 'bar',
                data: { labels, datasets:[{ label:'Reservas', data:values, backgroundColor:'#fbbf24', borderColor:'#f59e0b', borderWidth:2 }] },
                options: { responsive:true, plugins:{legend:{display:false}} }
            });
        }

        function applyFilters() {
            const desde = desdePicker.selectedDates[0];
            const hasta = hastaPicker.selectedDates[0];
            let filtered = allReservas;
            if (desde) filtered = filtered.filter(r => new Date(r.fecha.split(' ').reverse().join('-')) >= desde);
            if (hasta) filtered = filtered.filter(r => new Date(r.fecha.split(' ').reverse().join('-')) <= hasta);
            calcularKPIs(filtered);
            renderTable(filtered);
            renderChart(filtered);
        }

        function resetFilters() {
            desdePicker.clear(); hastaPicker.clear();
            applyFilters();
        }

        function exportarCSV() {
            // mismo código que antes...
            let csv = "Yate,Fecha,Hora,Cliente,Telefono\n";
            allReservas.forEach(r => {
                csv += `"${r.yate||''}","${r.fecha||''}","${r.hora||''}","${r.nombreCliente||r.nombre||''}","${r.telefono||''}"\n`;
            });
            const blob = new Blob([csv], {type:'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'reservas_elite.csv'; a.click();
        }

        function cargarReservasAdmin() {
            db.collection("reservas").onSnapshot(snapshot => {
                allReservas = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                calcularKPIs(allReservas);
                renderTable(allReservas);
                renderChart(allReservas);
            });
        }

        function login() { /* mismo código de antes */ }
        function logout() { auth.signOut().then(()=>location.reload()); }
        function agregarAGoogleCalendar(yate,fecha,hora) { /* mismo código */ }

        auth.onAuthStateChanged(user => {
            if (user) cargarReservasAdmin();
        });

        window.onload = () => {
            desdePicker = flatpickr("#filter-desde", {locale:"es", dateFormat:"d/m/Y"});
            hastaPicker = flatpickr("#filter-hasta", {locale:"es", dateFormat:"d/m/Y"});
        };
    </script>
</body>
</html>
