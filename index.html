    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDtCAOAalVb0ReJjSaIzjEQimoQ-9_4e0",
            authDomain: "elite-yacht-rentals.firebaseapp.com",
            projectId: "elite-yacht-rentals",

            messagingSenderId: "601846230412",

        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // Solicitar permiso de notificaciones push
        async function solicitarPermisoPush() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    const token = await messaging.getToken();
                    console.log("Token de notificación push:", token);
                }
            } catch (error) {
                console.error("Error al solicitar permiso:", error);
            }
        }

        // Ejecutar al cargar la página
        window.addEventListener('load', solicitarPermisoPush);
    </script>
